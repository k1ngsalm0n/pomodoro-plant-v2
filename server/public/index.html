<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pomodoro Plant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Screen 1: Login -->
    <div id="login-screen" class="screen">
        <h1>Login</h1>
        <input type="text" id="login-username" placeholder="Username">
        <input type="password" id="login-password" placeholder="Password">
        <button id="login-btn">Login</button>
        <span id="go-register">Register</span>
    </div>

    <!-- Screen 2: Register -->
    <div id="register-screen" class="screen hidden">
        <h1>Register</h1>
        <input type="text" id="register-username" placeholder="Username">
        <input type="password" id="register-password" placeholder="Password">
        <button id="register-btn">Register</button>
        <span id="go-login">Login</span>
    </div>

    <!-- Screen 3: Welcome -->
    <div id="welcome-screen" class="screen hidden">
        <h1>Welcome back, <span id="welcome-username">[username]</span></h1>
        <button id="begin-btn">Begin</button>
        
    </div>

    <!-- Screen 4: Menu -->
    <div id="menu-screen" class="screen hidden">
        <h1>What do you want to do?</h1>
        <button id="study-btn">Study</button>
        <button id="collection-btn">Collection</button>
    </div>

    <!-- Screen 5: Timer/Study -->
    <div id="timer-screen" class="screen hidden">
        <h1>Study</h1>
        <div id="timer-display">25:00</div>
        <div id="plant-image">🌱</div>
        <button id="start-btn">Start</button>
    </div>

    <!-- Screen 6: Collection -->
    <div id="collection-screen" class="screen hidden">
        <h1>Collection</h1>
        <button id="back-btn">Back</button>
        <div id="flowers-container"></div>
    </div>

    <script src="app.js"></script>
</body>
