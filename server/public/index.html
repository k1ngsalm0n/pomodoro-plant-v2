<!DOCTYPE html>
<html lang="en">
<head> 
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Pomodoro Plant</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- Screen 1: Login/Register -->
    <div id="auth-screen" class="screen">
        <h1>Pomodoro Plant</h1>
        <input type="text" id="username" placeholder="Username">
        <input type="password" id="password" placeholder="Password">
        <button id="login-btn">Login</button>
        <button id="register-btn">Register</button>
    </div>

    <!-- Screen 2: Welcome -->
    <div id="welcome-screen" class="screen hidden">
        <h1>Welcome back, [username]!</h1>
        <button id="begin-btn">Begin</button>
        
    </div>

    <!-- Screen 3: Menu -->
    <div id="menu-screen" class="screen hidden">
        <h1>What do you want to do?</h1>
        <button id="study-btn">Study</button>
        <button id="collection-btn">Collection</button>
    </div>

    <!-- Screen 4: Timer/Study -->
    <div id="timer-screen" class="screen hidden">
        <h1>Study</h1>
        <div id="timer-display">25:00</div>
        <div id="plant-image">🌱</div>
        <button id="start-btn">Start</button>
    </div>

    <!-- Screen 5: Collection -->
    <div id="collection-screen" class="screen hidden">
        <h1>Collection</h1>
        <button id="back-btn">Back</button>
        <div id="flowers-container"></div>
    </div>

    <script src="app.js"></script>
</body>
